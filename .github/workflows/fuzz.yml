name: Fuzz

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: ${{ matrix.target.func }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { pkg: "./encoding/", func: "FuzzDecodeVarUint" }
          - { pkg: "./crdt/",     func: "FuzzApplyUpdateV1" }
          - { pkg: "./crdt/",     func: "FuzzApplyUpdateV2" }
          - { pkg: "./sync/",     func: "FuzzApplySyncMessage" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Run fuzzer
        run: go test -run=^$ -fuzz=${{ matrix.target.func }} -fuzztime=300s ${{ matrix.target.pkg }}
      - name: Upload crash corpus
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target.func }}
          path: testdata/fuzz/
