version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - prealloc
    - tparallel
    - testifylint
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck, unparam]

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/reearth/ygo
