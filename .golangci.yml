version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goimports
    - misspell
    - unconvert
    - unparam
    - prealloc
    - tparallel
    - testifylint

linters-settings:
  goimports:
    local-prefixes: github.com/reearth/ygo

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, unparam]
