version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - prealloc
    - tparallel
    - testifylint

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/reearth/ygo

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, unparam]
